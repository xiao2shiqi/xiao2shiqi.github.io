baseURL = "https://blog.xiao27.com/"
theme = "PaperMod"
defaultContentLanguage = "zh"

# 启用搜索功能
[outputs]
    home = ["HTML", "RSS", "JSON"]

# 分页配置
[pagination]
    pagerSize = 10  # 每页显示的文章数量

[markup.goldmark.renderer]
    unsafe = true

[markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

[params]
    ShowPageNums = true
    defaultTheme = "auto"
    ShowShareButtons = true
    ShowReadingTime = true
    displayFullLangName = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowLanguageSwitcher = true  # 显示语言切换器

    # 搜索配置
    [params.fuseOpts]
        isCaseSensitive = false
        shouldSort = true
        location = 0
        distance = 1000
        threshold = 0.2
        minMatchCharLength = 2
        limit = 10
        keys = ["title", "permalink", "summary"]

    # 社交图标 (全局通用)
    [[params.socialIcons]]
        name = "x"
        url = "http://x.com/xiao2shiqi"

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/xiao2shiqi"

    [[params.socialIcons]]
        name = "email"
        url = "mailto:xiaobin.phoenix@gmail.com"

    [[params.socialIcons]]
        name = "wechat"
        title = "WeChat: 18198971094（点击查看二维码）"
        url = "/about/"

[languages.zh]
    languageName = "中文"
    languageCode = "zh-cn"
    contentDir = "content" # 保持默认，使用后缀区分
    weight = 1
    title = "肖斌的博客"
    
    [languages.zh.params.homeInfoParams]
        Title = "欢迎来到我的博客"
        Content = "<div class='home-info-github'> <img src='/images/avatar.jpg' alt='肖斌'> <div> <p>你好，我是肖斌。这里记录我的技术笔记与思考。</p> <p>我做了一个免费的英语学习站 <a href='https://nce.xiao27.com/'>Visual NCE</a>：用吉卜力风格插画重构《新概念英语》，音画同步 + 逐句精听，欢迎体验。更多项目见<a href='/projects/'>作品集</a>。</p> <p>📱 <b>微信：18198971094</b>（<a href='/about/'>扫码加好友</a>）</p> </div> </div> <style>.home-info-github { display: flex; align-items: center; gap: 40px; text-align: left; margin: 20px 0; } .home-info-github img { width: 180px; height: 180px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); } .home-info-github div { flex: 1; } @media (max-width: 600px) { .home-info-github { flex-direction: column; text-align: center; } }</style>"

    [[languages.zh.menu.main]]
        name = "文章"
        url = "/posts"
        weight = 1
    [[languages.zh.menu.main]]
        name = "Visual NCE"
        url = "https://nce.xiao27.com/"
        weight = 2
    [[languages.zh.menu.main]]
        name = "作品集"
        url = "/projects"
        weight = 3
    [[languages.zh.menu.main]]
        name = "标签"
        url = "/tags"
        weight = 4
    [[languages.zh.menu.main]]
        name = "搜索"
        url = "/search"
        weight = 5
    [[languages.zh.menu.main]]
        name = "关于"
        url = "/about"
        weight = 6

